<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Nebula - Floppy Spaceship</title>

<style>
body{
margin:0;
overflow:hidden;
background:#050510;
font-family:Segoe UI;
color:white;
user-select:none;
touch-action:manipulation;
}

canvas{
display:block;
}

#ui-layer{
position:absolute;
top:20px;
left:20px;
pointer-events:none;
}

.score-board{
font-size:28px;
font-weight:bold;
text-shadow:0 0 10px #00c3ff;
}

#gameOver{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
background:rgba(0,0,0,0.85);
padding:40px;
border-radius:20px;
border:2px solid #00c3ff;
box-shadow:0 0 30px rgba(0,195,255,0.3);
display:none;
}

h1{margin:0;font-size:48px;color:#00c3ff;}
p{font-size:20px;margin:10px 0;}

button{
margin-top:20px;
padding:12px 30px;
font-size:20px;
border:none;
background:linear-gradient(45deg,#00c3ff,#0066ff);
color:white;
border-radius:50px;
cursor:pointer;
}
</style>
</head>

<body>

<div id="ui-layer">
<div class="score-board">Score: <span id="currentScore">0</span></div>
</div>

<div id="gameOver">
<h1>CRASHED</h1>
<p id="scoreText"></p>
<p id="highScoreText"></p>
<button onclick="restartGame()">RELAUNCH</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let gravity = 0.25;
let boost = -6;

let baseSpeed = 4;
let speed = baseSpeed;

let gameRunning = true;

let score = 0;
let highScore = localStorage.getItem("floppyHighScore") || 0;

let spaceship,pipes,stars,particles;

function init(){

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

spaceship={
x:150,
y:canvas.height/2,
width:40,
height:25,
velocity:0,
rotation:0
};

pipes=[];
particles=[];

stars = Array.from({length:100},()=>({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2,
speed:Math.random()*0.5+0.1
}));

}

class Particle{
constructor(x,y){

this.x=x;
this.y=y;

this.size=Math.random()*5+2;

this.speedX=-Math.random()*4-2;
this.speedY=(Math.random()-0.5)*2;

this.color=`hsla(${180+Math.random()*40},100%,50%,${Math.random()})`;

}

update(){
this.x+=this.speedX;
this.y+=this.speedY;
this.size*=0.95;
}

draw(){

ctx.fillStyle=this.color;

ctx.beginPath();
ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
ctx.fill();

}
}

let pipeTimer=0;

function createPipe(){

let gap=200;
let min=60;

let gapY=Math.random()*(canvas.height-gap-(min*2))+min;

pipes.push({
x:canvas.width,
top:gapY,
bottom:gapY+gap,
width:70,
passed:false
});

}

function drawSpaceship(){

ctx.save();

ctx.translate(spaceship.x,spaceship.y);
ctx.rotate(spaceship.rotation);

ctx.shadowBlur=15;
ctx.shadowColor="#00c3ff";

ctx.fillStyle="#00c3ff";

ctx.beginPath();
ctx.moveTo(20,0);
ctx.lineTo(-20,-15);
ctx.lineTo(-15,0);
ctx.lineTo(-20,15);
ctx.closePath();
ctx.fill();

ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(0,0,5,0,Math.PI*2);
ctx.fill();

ctx.restore();

}

function drawBackground(){

ctx.fillStyle="#050510";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";

stars.forEach(s=>{

ctx.beginPath();
ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
ctx.fill();

s.x-=s.speed;

if(s.x<0) s.x=canvas.width;

});

}

function update(){

if(!gameRunning) return;

pipeTimer++;

if(pipeTimer>110){
createPipe();
pipeTimer=0;
}

spaceship.velocity+=gravity;
spaceship.y+=spaceship.velocity;

spaceship.rotation=Math.min(Math.PI/4,
Math.max(-Math.PI/4,spaceship.velocity*0.05));

particles.push(new Particle(spaceship.x-15,spaceship.y));

if(spaceship.y<0 || spaceship.y>canvas.height){
gameOver();
}

pipes.forEach((pipe,index)=>{

pipe.x-=speed;

if(
spaceship.x+20>pipe.x &&
spaceship.x-20<pipe.x+pipe.width &&
(
spaceship.y-12<pipe.top ||
spaceship.y+12>pipe.bottom
)
){
gameOver();
}

if(pipe.x+pipe.width<spaceship.x && !pipe.passed){

pipe.passed=true;

score++;

document.getElementById("currentScore").innerText=score;

/* controlled difficulty increase */
if(score % 10 === 0){
speed = baseSpeed + (score/10)*0.5;
}

}

if(pipe.x<-pipe.width){
pipes.splice(index,1);
}

});

particles.forEach((p,i)=>{

p.update();

if(p.size<0.5) particles.splice(i,1);

});

}

function draw(){

drawBackground();

particles.forEach(p=>p.draw());

pipes.forEach(pipe=>{

let grad=ctx.createLinearGradient(pipe.x,0,pipe.x+pipe.width,0);

grad.addColorStop(0,"#00ff88");
grad.addColorStop(1,"#008855");

ctx.fillStyle=grad;

ctx.shadowBlur=10;
ctx.shadowColor="#00ff88";

ctx.fillRect(pipe.x,0,pipe.width,pipe.top);

ctx.fillRect(pipe.x,pipe.bottom,pipe.width,canvas.height);

ctx.shadowBlur=0;

});

drawSpaceship();

}

function loop(){

update();
draw();
requestAnimationFrame(loop);

}

function boostShip(e){

if(e.type==="touchstart") e.preventDefault();

/* restart game with tap on mobile */
if(!gameRunning){
restartGame();
return;
}

spaceship.velocity=boost;

}

function gameOver(){

gameRunning=false;

if(score>highScore){

highScore=score;

localStorage.setItem("floppyHighScore",highScore);

}

document.getElementById("gameOver").style.display="block";

document.getElementById("scoreText").innerText="Final Score: "+score;

document.getElementById("highScoreText").innerText="Best: "+highScore;

}

function restartGame(){

init();

score=0;
speed=baseSpeed;
gameRunning=true;

document.getElementById("currentScore").innerText="0";

document.getElementById("gameOver").style.display="none";

}

window.addEventListener("mousedown",boostShip);
window.addEventListener("touchstart",boostShip,{passive:false});
window.addEventListener("keydown",e=>{
if(e.code==="Space") boostShip(e);
});

window.addEventListener("resize",init);

init();
loop();

</script>

</body>
</html>
